{% extends "base.html" %}
{% block title %}{{ chat_entry.title }}{% endblock %}

{% block extra_css %}
<style>
    .chat-container { height: 600px; overflow-y: auto; padding: 20px; }
</style>
{% endblock %}

{% block main %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-robot icon-placeholder"></i>{{ chat_entry.title }}</h5>
            </div>

            <!-- 对话内容区 -->
            <div class="chat-container" id="chatContainer">
                {% for msg in messages %}
                <div class="chat-bubble {% if msg.is_user %}user-bubble{% else %}ai-bubble{% endif %}">
                    {{ msg.content }}
                </div>
                {% endfor %}
                <div id="streamOutput" class="chat-bubble ai-bubble d-none"></div>
            </div>

            <!-- 输入对话框 -->
            <div class="card-footer bg-white">
                <form id="chatForm" class="d-flex gap-2">
                    {% csrf_token %}
                    <input type="text" id="userInput" class="form-control rounded-pill" placeholder="输入你的问题..." autocomplete="off">
                    <button type="submit" class="btn btn-primary rounded-pill">发送</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 流式对话打字机效果
    const streamOutput = document.getElementById('streamOutput');
    const chatForm = document.getElementById('chatForm');
    const userInput = document.getElementById('userInput');
    const chatContainer = document.getElementById('chatContainer');

    chatForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const message = userInput.value.trim();
        if (!message) return;

        // 显示用户消息
        const userBubble = document.createElement('div');
        userBubble.className = 'chat-bubble user-bubble';
        userBubble.textContent = message;
        chatContainer.appendChild(userBubble);

        // 清空输入
        userInput.value = '';
        streamOutput.classList.remove('d-none');
        streamOutput.textContent = '';

        // 模拟流式响应
        const response = "这是AI的流式回复效果，文字会逐字显示，模拟真实AI对话体验~";
        let index = 0;
        const typing = setInterval(() => {
            streamOutput.textContent += response[index];
            index++;
            chatContainer.scrollTop = chatContainer.scrollHeight;
            if (index >= response.length) clearInterval(typing);
        }, 50);
    });
</script>
{% endblock %}
