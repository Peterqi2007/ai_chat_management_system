{% extends "base.html" %}  <!-- 继承Mezzanine默认模板 -->
{% load static %}         <!-- 必须加：加载静态文件标签 -->

{% block content %}
    <!-- 你的对话页面HTML内容 -->
    <div class="chat-container">
        <div id="reply_area" class="alert alert-info"></div>
        <input type="hidden" id="conv_id" value="{{ conversation.id }}">
        <textarea id="user_input" class="form-control" placeholder="输入消息..."></textarea>
        <button onclick="sendMessage()" class="btn btn-primary mt-2">发送</button>
    </div>
{% endblock %}

<!-- 【关键】在页面底部加载JS（推荐位置） -->
{% block extra_js %}
    <script src="{% static 'chat/js/chat.js' %}"></script>
{% endblock %}
