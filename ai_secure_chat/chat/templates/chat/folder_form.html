{% extends "base.html" %}
{% block title %}{% if object %}编辑文件夹{% else %}新建文件夹{% endif %}{% endblock %}
{% block main %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card p-4">
                <h4 class="text-primary mb-4"><i class="fas fa-folder-plus icon-placeholder"></i>{% if object %}编辑{% else %}新建{% endif %}文件夹</h4>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">保存</button>
                        <button type="button" class="btn btn-secondary" onclick="window.history.back()">取消</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
