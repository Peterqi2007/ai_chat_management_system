{% extends "base.html" %}
{% block title %}隐私对话验证{% endblock %}
{% block main %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card p-4 text-center">
                <i class="fas fa-lock text-primary fa-3x mb-3"></i>
                <h4 class="text-primary fw-bold mb-3">隐私对话验证</h4>
                <p class="text-muted mb-4">请输入隐私密码解锁</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input type="password" name="privacy_password" class="form-control" placeholder="请输入密码" required>
                        {% if form.errors %}
                        <div class="text-danger small mt-2">密码错误，请重试</div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">验证解锁</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
